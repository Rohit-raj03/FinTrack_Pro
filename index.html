<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="">
    <!-- Authentication -->
    <div class="auth-container">
      <!-- Login -->
      <div class="login-card">
        <h1>Welcome Back</h1>
        <p>Login to <span>FinTrack Pro</span></p>

        <form id="loginForm">
          <div class="input-box">
            <label>Username</label>
            <input
              id="loginUsername"
              type="text"
              placeholder="Enter username"
            />
          </div>

          <div class="input-box">
            <label>Password</label>
            <input
              id="loginPassword"
              type="password"
              placeholder="Enter password"
            />
          </div>

          <button class="autho_btn" type="submit">Login</button>
        </form>

        <p class="register">
          Don't have an account?
          <a id="sign_up" href="#">Register here</a>
        </p>
      </div>

      <!-- Register -->
      <div class="register-card hidden">
        <h1>Create Account</h1>
        <p>Join <span>FinTrack Pro</span></p>

        <form id="registerForm">
          <div class="input-box">
            <label>Choose a Username</label>
            <input
              id="registerUsername"
              type="text"
              placeholder="Enter username"
            />
          </div>

          <div class="input-box">
            <label>Password</label>
            <input
              id="registerPassword"
              type="password"
              placeholder="Create password"
            />
          </div>

          <button class="autho_btn" type="submit">Register</button>
        </form>

        <p class="register">
          Already have an account?
          <a id="Login" href="#">Login here</a>
        </p>
      </div>
    </div>

    <!-- Main App -->
    <main class="app hidden">
      <aside>Sidebar</aside>

      <section>Dashboard</section>
      <button id="logOut">long out</button>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
